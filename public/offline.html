<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KnowYourPew Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
        color: #172554;
        font-family: Arial, Helvetica, sans-serif;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        max-width: 32rem;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #fde68a;
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(23, 37, 84, 0.12);
        text-align: center;
      }

      .badge {
        display: inline-block;
        background: #fbbf24;
        color: #172554;
        border-radius: 999px;
        padding: 8px 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
      }

      h1 {
        margin: 16px 0 12px;
        font-size: 30px;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">KnowYourPew</div>
      <h1>You&apos;re offline for the moment</h1>
      <p>
        If you already opened the assessment, you can keep using saved pages from your device.
        Once your connection returns, refresh and your results can be sent normally.
      </p>
    </main>
  </body>
</html>
